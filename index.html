<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --accent: #e94560;
  --sand: #f4a261;
  --sand-light: #f4c98a;
  --text: #eee;
  --text-dim: #8899aa;
  --green: #2ecc71;
  --radius: 14px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

h1 {
  text-align: center;
  font-size: 1.6rem;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--sand), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 24px;
}

.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Input screen */
.player-inputs {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.player-input {
  display: flex;
  align-items: center;
  gap: 10px;
}

.player-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--sand);
  flex-shrink: 0;
}

input[type="text"] {
  flex: 1;
  padding: 14px 16px;
  border: 2px solid var(--card);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
}

input[type="text"]:focus { border-color: var(--sand); }
input[type="text"]::placeholder { color: var(--text-dim); }

/* Tournament name */
.tournament-name-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
  padding: 16px;
  background: linear-gradient(135deg, rgba(244,162,97,0.1), rgba(233,69,96,0.1));
  border: 2px solid rgba(244,162,97,0.3);
  border-radius: var(--radius);
}

.tournament-name-row input {
  flex: 1;
  padding: 0;
  border: none;
  background: transparent;
  color: var(--sand);
  font-size: 1.2rem;
  font-weight: 700;
  outline: none;
  text-align: center;
}

.tournament-name-row input::placeholder { color: rgba(244,162,97,0.4); }

.btn-shuffle {
  width: 36px;
  height: 36px;
  border: none;
  background: rgba(244,162,97,0.15);
  color: var(--sand);
  font-size: 1.1rem;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: background 0.2s;
}

.btn-shuffle:active { background: rgba(244,162,97,0.3); }

/* Buttons */
.btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, var(--sand), var(--accent));
  color: #fff;
}

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-secondary {
  background: var(--card);
  color: var(--text);
  margin-top: 12px;
}

.btn-danger {
  background: var(--accent);
  color: #fff;
  margin-top: 12px;
}

/* Game cards */
.game-card {
  background: var(--surface);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  border: 2px solid transparent;
  transition: border-color 0.3s;
}

.game-card.current { border-color: var(--sand); }
.game-card.completed { opacity: 0.7; }

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--card);
}

.game-num {
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--sand);
}

.game-rest {
  font-size: 0.75rem;
  color: var(--text-dim);
}

.game-body { padding: 16px; }

.game-teams {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
}

.team-label {
  flex: 1;
  padding: 12px 8px;
  border: 2px solid var(--card);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 0.95rem;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
}

.team-label.winner { border-color: var(--green); color: var(--green); }
.team-label.loser { border-color: var(--accent); opacity: 0.6; }

.vs-label {
  font-weight: 700;
  color: var(--text-dim);
  font-size: 0.8rem;
  flex-shrink: 0;
}

.score-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
}

input[type="number"] {
  width: 70px;
  padding: 12px;
  border: 2px solid var(--card);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 1.4rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
}

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type="number"]:focus { border-color: var(--sand); }

.score-colon {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-dim);
}

.game-result-summary {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 0.88rem;
}

.game-result-summary .team {
  flex: 1;
  font-weight: 600;
  color: var(--text-dim);
}

.game-result-summary .team.winner { color: var(--green); }
.game-result-summary .team-left { text-align: left; }
.game-result-summary .team-right { text-align: right; }

.game-result-summary .score {
  color: var(--sand);
  font-weight: 700;
  font-size: 1rem;
  flex-shrink: 0;
  white-space: nowrap;
}

.game-time {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: right;
  padding: 0 14px 8px;
}

/* Leaderboard */
.leaderboard {
  margin-top: 20px;
  margin-bottom: 20px;
}

.leaderboard h2 {
  font-size: 1.1rem;
  margin-bottom: 12px;
  color: var(--sand);
}

.lb-table {
  width: 100%;
  border-collapse: collapse;
}

.lb-table th {
  padding: 10px 8px;
  text-align: left;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--card);
}

.lb-table td {
  padding: 10px 8px;
  font-size: 0.9rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.lb-table tr:first-child td {
  color: var(--sand);
  font-weight: 700;
}

.lb-table .rank { font-weight: 700; width: 30px; }
.lb-table .name { font-weight: 600; }
.lb-table .wins { color: var(--green); text-align: center; }
.lb-table .losses { color: var(--accent); text-align: center; }
.lb-table .points { color: var(--sand); text-align: center; }
.lb-table .games { color: var(--text-dim); text-align: center; }

/* Final screen */
.trophy { text-align: center; font-size: 3rem; margin-bottom: 12px; }

.final-title {
  text-align: center;
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--sand), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.final-tournament-name {
  text-align: center;
  font-size: 1rem;
  color: var(--sand);
  font-weight: 600;
  margin-bottom: 8px;
}

.podium {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 8px;
  margin-bottom: 24px;
  height: 180px;
}

.podium-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.podium-bar {
  width: 80px;
  border-radius: 10px 10px 0 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 12px;
}

.podium-bar.p1 { height: 140px; background: linear-gradient(to top, #f4a261, #e76f51); }
.podium-bar.p2 { height: 100px; background: linear-gradient(to top, #8899aa, #6c7a89); }
.podium-bar.p3 { height: 70px; background: linear-gradient(to top, #cd7f32, #a0522d); }

.podium-rank { font-size: 1.5rem; font-weight: 900; color: rgba(255,255,255,0.9); }
.podium-name { font-size: 0.85rem; font-weight: 700; text-align: center; }
.podium-stats { font-size: 0.7rem; color: var(--text-dim); text-align: center; }

.games-played-note {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-bottom: 16px;
}

/* History screen */
.history-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.history-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.2s;
  border: 2px solid transparent;
  position: relative;
}

.history-card:active { border-color: var(--sand); }

.history-card-name {
  font-weight: 700;
  font-size: 1rem;
  color: var(--sand);
  margin-bottom: 4px;
}

.history-card-meta {
  font-size: 0.8rem;
  color: var(--text-dim);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.history-card-winner {
  color: var(--green);
  font-weight: 600;
}

.history-card-date {
  font-size: 0.75rem;
  color: var(--text-dim);
}

.history-delete {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--accent);
  font-size: 1rem;
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.5;
  transition: opacity 0.2s;
}

.history-delete:hover, .history-delete:active { opacity: 1; }

.empty-history {
  text-align: center;
  color: var(--text-dim);
  padding: 40px 0;
  font-size: 0.9rem;
}

/* Detail screen */
.detail-header {
  text-align: center;
  margin-bottom: 16px;
}

.detail-name {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--sand);
  margin-bottom: 4px;
}

.detail-meta {
  font-size: 0.8rem;
  color: var(--text-dim);
}

.detail-games {
  margin-top: 16px;
}

.detail-games h2 {
  font-size: 1rem;
  color: var(--sand);
  margin-bottom: 10px;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="container">
  <h1>Beach Volley Garage-Tunis</h1>
  <p class="subtitle" id="subtitle">Введите 5 или 6 игроков</p>

  <!-- Screen 1: Player Names -->
  <div id="screen-names" class="screen active">
    <div class="tournament-name-row">
      <input type="text" id="tournament-name" placeholder="Название турнира">
      <button class="btn-shuffle" id="btn-shuffle" onclick="shuffleName()">🎲</button>
    </div>
    <div class="player-inputs" id="player-inputs"></div>
    <button class="btn btn-primary" id="btn-start" disabled>Начать турнир</button>
    <button class="btn btn-secondary" id="btn-history" onclick="showHistory()">Результаты турниров</button>
    <button class="btn btn-secondary" style="margin-top:8px;font-size:0.85rem;opacity:0.7" onclick="showFeedback()">💬 Обратная связь</button>
  </div>

  <!-- Screen 2: Current Game -->
  <div id="screen-games" class="screen">
    <div id="games-list"></div>
    <div class="leaderboard" id="leaderboard-section">
      <h2>Таблица</h2>
      <table class="lb-table">
        <thead>
          <tr>
            <th class="rank">#</th>
            <th class="name">Игрок</th>
            <th class="wins">Побед</th>
            <th class="losses">Пораж</th>
            <th class="points">Очки</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Screen 3: Final Results -->
  <div id="screen-final" class="screen">
    <div class="trophy">🏐</div>
    <div class="final-title">Турнир завершён!</div>
    <div id="final-tournament-name" class="final-tournament-name"></div>
    <div id="games-played-note" class="games-played-note"></div>
    <div id="podium" class="podium"></div>
    <div class="leaderboard">
      <h2>Итоговая таблица</h2>
      <table class="lb-table">
        <thead>
          <tr>
            <th class="rank">#</th>
            <th class="name">Игрок</th>
            <th class="wins">Побед</th>
            <th class="losses">Пораж</th>
            <th class="points">Очки</th>
            <th class="games">Игр</th>
          </tr>
        </thead>
        <tbody id="final-leaderboard-body"></tbody>
      </table>
    </div>
    <button class="btn btn-primary" id="btn-restart">Новый турнир</button>
  </div>

  <!-- Screen 4: History -->
  <div id="screen-history" class="screen">
    <div id="history-list" class="history-list"></div>
    <button class="btn btn-secondary" onclick="showScreen(screenNames)">Назад</button>
  </div>

  <!-- Screen 5: Tournament Detail -->
  <div id="screen-detail" class="screen">
    <div id="detail-content"></div>
    <button class="btn btn-secondary" onclick="showHistory()">Назад</button>
  </div>

  <!-- Screen 6: Feedback -->
  <div id="screen-feedback" class="screen">
    <h2 style="color:var(--sand);margin-bottom:16px">Обратная связь</h2>
    <p style="color:var(--text-dim);font-size:0.85rem;margin-bottom:16px">Нашли баг? Хотите фичу? Напишите!</p>
    <textarea id="feedback-text" rows="4" maxlength="500" placeholder="Ваше сообщение (до 500 символов)..." style="width:100%;padding:14px 16px;border:2px solid var(--card);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:1rem;font-family:inherit;outline:none;resize:vertical;margin-bottom:16px"></textarea>
    <button class="btn btn-primary" id="btn-send-feedback" onclick="sendFeedback()" disabled>Отправить</button>
    <div id="feedback-success" style="display:none;text-align:center;color:var(--green);margin-top:12px;font-weight:600">Спасибо! Сообщение отправлено ✓</div>
    <div id="feedback-messages" style="margin-top:24px"></div>
    <button class="btn btn-secondary" onclick="showScreen(screenNames)">Назад</button>
  </div>
</div>

<script>
// ============================================================
// TOURNAMENT NAMES
// ============================================================

const TOURNAMENT_NAMES = [
  'Песчаное месиво',
  'Песок в глазах',
  'Пляжная буря',
  'Солнечный удар',
  'Песчаные войны',
  'Мяч в лицо',
  'Шлёп по мячу',
  'Пот и песок',
  'Песочные черви',
  'Лицом в песок',
  'Кто последний — тот и в сетке',
];

function randomTournamentName() {
  return TOURNAMENT_NAMES[Math.floor(Math.random() * TOURNAMENT_NAMES.length)];
}

function shuffleName() {
  document.getElementById('tournament-name').value = randomTournamentName();
}

// ============================================================
// SCHEDULE
// ============================================================

const SCHEDULE_TEMPLATE_6 = [
  { team1: [0, 2], team2: [3, 5], rest: [1, 4] },
  { team1: [1, 4], team2: [3, 5], rest: [0, 2] },
  { team1: [0, 4], team2: [1, 2], rest: [3, 5] },
  { team1: [0, 5], team2: [1, 3], rest: [2, 4] },
  { team1: [2, 5], team2: [3, 4], rest: [0, 1] },
  { team1: [0, 1], team2: [4, 5], rest: [2, 3] },
  { team1: [0, 1], team2: [2, 3], rest: [4, 5] },
  { team1: [1, 5], team2: [3, 4], rest: [0, 2] },
  { team1: [0, 3], team2: [2, 4], rest: [1, 5] },
  { team1: [0, 2], team2: [1, 5], rest: [3, 4] },
  { team1: [1, 4], team2: [2, 3], rest: [0, 5] },
  { team1: [0, 5], team2: [2, 4], rest: [1, 3] },
];

const SCHEDULE_TEMPLATE_5 = [
  { team1: [0, 4], team2: [1, 2], rest: [3] },
  { team1: [0, 4], team2: [1, 3], rest: [2] },
  { team1: [0, 2], team2: [1, 3], rest: [4] },
  { team1: [0, 2], team2: [3, 4], rest: [1] },
  { team1: [1, 4], team2: [2, 3], rest: [0] },
  { team1: [0, 1], team2: [2, 4], rest: [3] },
  { team1: [0, 1], team2: [2, 3], rest: [4] },
  { team1: [0, 3], team2: [1, 4], rest: [2] },
  { team1: [1, 2], team2: [3, 4], rest: [0] },
  { team1: [0, 3], team2: [2, 4], rest: [1] },
];

// ============================================================
// SUPABASE
// ============================================================

const SUPABASE_URL = 'https://bukyxdybwxwtpzywdlhu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_OQ5EqGIdYW-lqHDzWbOJ1A__ACJO2wF';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STORAGE (Supabase)
// ============================================================

async function loadTournaments() {
  const { data, error } = await db
    .from('tournaments')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { console.error('Load error:', error); return []; }
  return data;
}

async function saveTournament(tournament) {
  const { error } = await db.from('tournaments').insert({
    name: tournament.name,
    players: tournament.players,
    schedule: tournament.schedule,
    results: tournament.results,
    started_at: tournament.startedAt,
    finished_at: tournament.finishedAt,
  });
  if (error) console.error('Save error:', error);
}

async function deleteTournament(id) {
  const { error } = await db.from('tournaments').delete().eq('id', id);
  if (error) console.error('Delete error:', error);
}

// ============================================================
// APP STATE
// ============================================================

let players = [];
let schedule = [];
let gameResults = []; // { score1, score2, time }
let currentGame = 0;
let tournamentName = '';
let tournamentStartedAt = null;

// ============================================================
// UI
// ============================================================

const screenNames = document.getElementById('screen-names');
const screenGames = document.getElementById('screen-games');
const screenFinal = document.getElementById('screen-final');
const screenHistory = document.getElementById('screen-history');
const screenDetail = document.getElementById('screen-detail');
const screenFeedback = document.getElementById('screen-feedback');
const allScreens = [screenNames, screenGames, screenFinal, screenHistory, screenDetail, screenFeedback];
let _isPopState = false;

function showScreen(screen, pushState) {
  allScreens.forEach(s => s.classList.remove('active'));
  screen.classList.add('active');
  window.scrollTo(0, 0);
  if (pushState !== false && !_isPopState) {
    history.pushState({ screen: screen.id }, '', '#' + screen.id);
  }
}

window.addEventListener('popstate', async (e) => {
  const screenId = e.state?.screen || 'screen-names';
  const screen = document.getElementById(screenId);
  if (!screen) return;

  _isPopState = true;
  if (screenId === 'screen-history') {
    await showHistory();
  } else {
    showScreen(screen, false);
  }
  _isPopState = false;
});

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ru', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

// --- Screen 1: Player names ---

function initPlayerInputs() {
  const container = document.getElementById('player-inputs');
  for (let i = 1; i <= 6; i++) {
    const div = document.createElement('div');
    div.className = 'player-input';
    div.innerHTML = `
      <div class="player-num">${i}</div>
      <input type="text" id="player-${i}" placeholder="${i <= 5 ? 'Игрок ' + i : 'Игрок 6 (необязательно)'}" autocomplete="off">
    `;
    container.appendChild(div);
  }

  container.addEventListener('input', checkStartEnabled);
  document.getElementById('tournament-name').addEventListener('input', checkStartEnabled);
}

function getFilledPlayers() {
  return Array.from({ length: 6 }, (_, i) =>
    document.getElementById(`player-${i + 1}`).value.trim()
  ).filter(v => v.length > 0);
}

function checkStartEnabled() {
  const nameOk = document.getElementById('tournament-name').value.trim().length > 0;
  const filled = getFilledPlayers();
  const playersOk = filled.length === 5 || filled.length === 6;
  document.getElementById('btn-start').disabled = !(nameOk && playersOk);

  const subtitle = document.getElementById('subtitle');
  if (filled.length < 5) {
    subtitle.textContent = 'Введите 5 или 6 игроков';
  } else if (filled.length === 5) {
    subtitle.textContent = 'Турнир на 5 игроков · 10 игр';
  } else {
    subtitle.textContent = 'Турнир на 6 игроков · 12 игр';
  }
}

document.getElementById('btn-start').addEventListener('click', () => {
  tournamentName = document.getElementById('tournament-name').value.trim();
  players = getFilledPlayers();

  const template = players.length === 5 ? SCHEDULE_TEMPLATE_5 : SCHEDULE_TEMPLATE_6;
  schedule = template.map(g => ({
    team1: [...g.team1], team2: [...g.team2], rest: [...g.rest]
  }));
  gameResults = [];
  currentGame = 0;
  tournamentStartedAt = new Date().toISOString();

  renderCurrentGame();
  updateLeaderboard();
  showScreen(screenGames);
});

// --- Screen 2: Games ---

function renderCurrentGame() {
  const container = document.getElementById('games-list');
  container.innerHTML = '';

  for (let i = 0; i < currentGame; i++) {
    const g = schedule[i];
    const r = gameResults[i];
    if (!r) continue;

    const card = document.createElement('div');
    card.className = 'game-card completed';

    const t1names = g.team1.map(idx => players[idx]).join(' + ');
    const t2names = g.team2.map(idx => players[idx]).join(' + ');
    const restNames = g.rest.map(idx => players[idx]).join(', ');

    card.innerHTML = `
      <div class="game-header">
        <span class="game-num">Игра ${i + 1}</span>
        <span class="game-rest">отдых: ${restNames}</span>
      </div>
      <div class="game-result-summary">
        <span class="team team-left ${r.score1 > r.score2 ? 'winner' : ''}">${t1names}</span>
        <span class="score">${r.score1}:${r.score2}</span>
        <span class="team team-right ${r.score2 > r.score1 ? 'winner' : ''}">${t2names}</span>
      </div>
      ${r.time ? `<div class="game-time">${formatTime(r.time)}</div>` : ''}
    `;
    container.appendChild(card);
  }

  if (currentGame < schedule.length) {
    const g = schedule[currentGame];
    const i = currentGame;
    const t1names = g.team1.map(idx => players[idx]).join(' + ');
    const t2names = g.team2.map(idx => players[idx]).join(' + ');
    const restNames = g.rest.map(idx => players[idx]).join(', ');

    const card = document.createElement('div');
    card.className = 'game-card current';
    card.id = `game-${i}`;
    card.innerHTML = `
      <div class="game-header">
        <span class="game-num">Игра ${i + 1} из ${schedule.length}</span>
        <span class="game-rest">отдых: ${restNames}</span>
      </div>
      <div class="game-body">
        <div class="game-teams">
          <div class="team-label" id="team1-label-${i}">${t1names}</div>
          <span class="vs-label">vs</span>
          <div class="team-label" id="team2-label-${i}">${t2names}</div>
        </div>
        <div class="score-row">
          <input type="number" id="score1-${i}" min="0" placeholder="—" inputmode="numeric">
          <span class="score-colon">:</span>
          <input type="number" id="score2-${i}" min="0" placeholder="—" inputmode="numeric">
        </div>
        <button class="btn btn-primary" id="confirm-btn-${i}" onclick="confirmGame(${i})" disabled>Следующая игра</button>
        <button class="btn btn-danger" onclick="finishTournament()">Закончить турнир</button>
      </div>
    `;
    container.appendChild(card);
  }
}

function checkConfirmEnabled(gameIdx) {
  const s1 = document.getElementById(`score1-${gameIdx}`);
  const s2 = document.getElementById(`score2-${gameIdx}`);
  if (!s1 || !s2) return;

  const v1 = parseInt(s1.value);
  const v2 = parseInt(s2.value);
  const valid = !isNaN(v1) && !isNaN(v2) && v1 >= 0 && v2 >= 0 && v1 !== v2;

  document.getElementById(`confirm-btn-${gameIdx}`).disabled = !valid;

  const l1 = document.getElementById(`team1-label-${gameIdx}`);
  const l2 = document.getElementById(`team2-label-${gameIdx}`);
  l1.classList.remove('winner', 'loser');
  l2.classList.remove('winner', 'loser');

  if (valid) {
    l1.classList.add(v1 > v2 ? 'winner' : 'loser');
    l2.classList.add(v2 > v1 ? 'winner' : 'loser');
  }
}

document.addEventListener('input', (e) => {
  if (e.target.id && (e.target.id.startsWith('score1-') || e.target.id.startsWith('score2-'))) {
    const idx = parseInt(e.target.id.split('-').pop());
    checkConfirmEnabled(idx);
  }
});

function confirmGame(gameIdx) {
  const score1 = parseInt(document.getElementById(`score1-${gameIdx}`).value);
  const score2 = parseInt(document.getElementById(`score2-${gameIdx}`).value);

  gameResults[gameIdx] = { score1, score2, time: new Date().toISOString() };
  currentGame++;

  if (currentGame >= schedule.length) {
    finishAndSave();
  } else {
    renderCurrentGame();
    updateLeaderboard();
  }
}

function finishTournament() {
  if (currentGame < schedule.length) {
    const s1el = document.getElementById(`score1-${currentGame}`);
    const s2el = document.getElementById(`score2-${currentGame}`);
    if (s1el && s2el) {
      const v1 = parseInt(s1el.value);
      const v2 = parseInt(s2el.value);
      if (!isNaN(v1) && !isNaN(v2) && v1 >= 0 && v2 >= 0 && v1 !== v2) {
        gameResults[currentGame] = { score1: v1, score2: v2, time: new Date().toISOString() };
      }
    }
  }
  finishAndSave();
}

async function finishAndSave() {
  const tournament = {
    name: tournamentName,
    players: [...players],
    schedule: schedule.map(g => ({ team1: [...g.team1], team2: [...g.team2], rest: [...g.rest] })),
    results: gameResults.filter(r => r != null),
    startedAt: tournamentStartedAt,
    finishedAt: new Date().toISOString(),
  };
  await saveTournament(tournament);
  showFinalScreen();
}

// --- Leaderboard ---

function getStatsFromData(playerNames, sched, res) {
  const stats = {};
  for (let i = 0; i < playerNames.length; i++) {
    stats[i] = { name: playerNames[i], wins: 0, losses: 0, points: 0, games: 0 };
  }

  for (let i = 0; i < res.length; i++) {
    if (!res[i]) continue;
    const g = sched[i];
    const r = res[i];
    const t1won = r.score1 > r.score2;
    const winTeam = t1won ? g.team1 : g.team2;
    const loseTeam = t1won ? g.team2 : g.team1;
    const winScore = t1won ? r.score1 : r.score2;
    const loseScore = t1won ? r.score2 : r.score1;

    for (const p of winTeam) {
      stats[p].wins++;
      stats[p].points += winScore;
      stats[p].games++;
    }
    for (const p of loseTeam) {
      stats[p].losses++;
      stats[p].points += loseScore;
      stats[p].games++;
    }
  }

  return Object.values(stats).sort((a, b) => {
    if (b.wins !== a.wins) return b.wins - a.wins;
    if (a.games !== b.games) return a.games - b.games;
    return b.points - a.points;
  });
}

function getStats() {
  return getStatsFromData(players, schedule, gameResults);
}

function updateLeaderboard() {
  renderLeaderboardTable('leaderboard-body', getStats());
}

function renderLeaderboardTable(tableId, sorted, showGames = false) {
  const tbody = document.getElementById(tableId);
  tbody.innerHTML = '';

  sorted.forEach((s, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank">${i + 1}</td>
      <td class="name">${s.name}</td>
      <td class="wins">${s.wins}</td>
      <td class="losses">${s.losses}</td>
      <td class="points">${s.points}</td>
      ${showGames ? `<td class="games">${s.games}</td>` : ''}
    `;
    tbody.appendChild(tr);
  });
}

// --- Final screen ---

function showFinalScreen() {
  const sorted = getStats();
  const gamesPlayed = gameResults.filter(r => r != null).length;

  document.getElementById('final-tournament-name').textContent = tournamentName;
  document.getElementById('games-played-note').textContent =
    `Сыграно игр: ${gamesPlayed} из ${schedule.length}`;

  const podium = document.getElementById('podium');
  const order = [1, 0, 2];
  podium.innerHTML = '';

  order.forEach(rank => {
    if (!sorted[rank]) return;
    const s = sorted[rank];
    const div = document.createElement('div');
    div.className = 'podium-item';
    div.innerHTML = `
      <div class="podium-name">${s.name}</div>
      <div class="podium-stats">${s.wins}W ${s.points}pts</div>
      <div class="podium-bar p${rank + 1}">
        <div class="podium-rank">${rank + 1}</div>
      </div>
    `;
    podium.appendChild(div);
  });

  renderLeaderboardTable('final-leaderboard-body', sorted, true);
  showScreen(screenFinal);
}

// --- History screen ---

async function showHistory() {
  const list = await loadTournaments();
  const container = document.getElementById('history-list');
  container.innerHTML = '';

  if (list.length === 0) {
    container.innerHTML = '<div class="empty-history">Пока нет завершённых турниров</div>';
    showScreen(screenHistory);
    return;
  }

  // Cache for detail view
  window._tournamentsCache = list;

  for (const t of list) {
    const stats = getStatsFromData(t.players, t.schedule, t.results);
    const winner = stats[0];
    const gamesPlayed = t.results.length;
    const dateStr = formatDate(t.started_at || t.startedAt);

    const card = document.createElement('div');
    card.className = 'history-card';
    card.innerHTML = `
      <div class="history-card-name">${t.name}</div>
      <div class="history-card-meta">
        <span>${t.players.length} игроков · ${gamesPlayed} игр</span>
        <span class="history-card-winner">${winner.name}</span>
      </div>
      <div class="history-card-date">${dateStr}</div>
      <button class="history-delete" onclick="event.stopPropagation(); confirmDelete(${t.id})">✕</button>
    `;
    card.addEventListener('click', () => showDetail(t.id));
    container.appendChild(card);
  }

  showScreen(screenHistory);
}

async function confirmDelete(id) {
  if (confirm('Удалить этот турнир?')) {
    await deleteTournament(id);
    showHistory();
  }
}

// --- Detail screen ---

function showDetail(id) {
  const list = window._tournamentsCache || [];
  const t = list.find(x => x.id === id);
  if (!t) return;

  const startedAt = t.started_at || t.startedAt;
  const finishedAt = t.finished_at || t.finishedAt;

  const stats = getStatsFromData(t.players, t.schedule, t.results);
  const container = document.getElementById('detail-content');

  let html = `
    <div class="detail-header">
      <div class="detail-name">${t.name}</div>
      <div class="detail-meta">
        Турнир на ${t.players.length} игроков · ${t.results.length} игр<br>
        ${formatDate(startedAt)} — ${formatTime(finishedAt)}
      </div>
    </div>
  `;

  // Leaderboard
  html += `
    <div class="leaderboard">
      <h2>Итоговая таблица</h2>
      <table class="lb-table">
        <thead>
          <tr>
            <th class="rank">#</th>
            <th class="name">Игрок</th>
            <th class="wins">Побед</th>
            <th class="losses">Пораж</th>
            <th class="points">Очки</th>
            <th class="games">Игр</th>
          </tr>
        </thead>
        <tbody>
  `;

  stats.forEach((s, i) => {
    html += `
      <tr ${i === 0 ? 'style="color:var(--sand);font-weight:700"' : ''}>
        <td class="rank">${i + 1}</td>
        <td class="name">${s.name}</td>
        <td class="wins">${s.wins}</td>
        <td class="losses">${s.losses}</td>
        <td class="points">${s.points}</td>
        <td class="games">${s.games}</td>
      </tr>
    `;
  });

  html += '</tbody></table></div>';

  // Games list
  html += '<div class="detail-games"><h2>Все игры</h2>';

  for (let i = 0; i < t.results.length; i++) {
    const g = t.schedule[i];
    const r = t.results[i];
    const t1names = g.team1.map(idx => t.players[idx]).join(' + ');
    const t2names = g.team2.map(idx => t.players[idx]).join(' + ');
    const restNames = g.rest.map(idx => t.players[idx]).join(', ');

    html += `
      <div class="game-card completed" style="opacity:1">
        <div class="game-header">
          <span class="game-num">Игра ${i + 1}</span>
          <span class="game-rest">отдых: ${restNames}</span>
        </div>
        <div class="game-result-summary">
          <span class="team team-left ${r.score1 > r.score2 ? 'winner' : ''}">${t1names}</span>
          <span class="score">${r.score1}:${r.score2}</span>
          <span class="team team-right ${r.score2 > r.score1 ? 'winner' : ''}">${t2names}</span>
        </div>
        ${r.time ? `<div class="game-time">${formatTime(r.time)}</div>` : ''}
      </div>
    `;
  }

  html += '</div>';

  container.innerHTML = html;
  showScreen(screenDetail);
}

// --- Feedback ---

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function showFeedback() {
  document.getElementById('feedback-text').value = '';
  document.getElementById('feedback-success').style.display = 'none';
  document.getElementById('btn-send-feedback').disabled = true;
  await loadFeedbackMessages();
  showScreen(screenFeedback);
}

document.addEventListener('input', (e) => {
  if (e.target.id === 'feedback-text') {
    document.getElementById('btn-send-feedback').disabled = e.target.value.trim().length === 0;
  }
});

async function sendFeedback() {
  const text = document.getElementById('feedback-text').value.trim().slice(0, 500);
  if (!text) return;
  const { error } = await db.from('feedback').insert({ message: text });
  if (error) { console.error('Feedback error:', error); alert('Ошибка отправки'); return; }
  document.getElementById('feedback-text').value = '';
  document.getElementById('btn-send-feedback').disabled = true;
  document.getElementById('feedback-success').style.display = 'block';
  await loadFeedbackMessages();
}

async function loadFeedbackMessages() {
  const container = document.getElementById('feedback-messages');
  const { data, error } = await db
    .from('feedback')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(50);
  if (error || !data || data.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = '<h2 style="color:var(--sand);font-size:1rem;margin-bottom:10px">Сообщения</h2>' +
    data.map(f => `
      <div style="background:var(--surface);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px">
        <div style="font-size:0.9rem;color:var(--text);white-space:pre-wrap;word-break:break-word">${escapeHtml(f.message)}</div>
        <div style="font-size:0.7rem;color:var(--text-dim);margin-top:6px">${formatDate(f.created_at)}</div>
      </div>
    `).join('');
}

// --- Reset ---

document.getElementById('btn-restart').addEventListener('click', () => {
  for (let i = 1; i <= 6; i++) {
    document.getElementById(`player-${i}`).value = '';
  }
  document.getElementById('tournament-name').value = randomTournamentName();
  document.getElementById('btn-start').disabled = true;
  document.getElementById('subtitle').textContent = 'Введите 5 или 6 игроков';
  showScreen(screenNames);
});

// --- Init ---
initPlayerInputs();
document.getElementById('tournament-name').value = randomTournamentName();
</script>
