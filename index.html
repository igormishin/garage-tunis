<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Beach Volley Tunis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --accent: #e94560;
  --sand: #f4a261;
  --sand-light: #f4c98a;
  --text: #eee;
  --text-dim: #8899aa;
  --green: #2ecc71;
  --radius: 14px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

h1 {
  text-align: center;
  font-size: 1.6rem;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--sand), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 24px;
}

/* Screens */
.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Input screen */
.player-inputs {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.player-input {
  display: flex;
  align-items: center;
  gap: 10px;
}

.player-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--sand);
  flex-shrink: 0;
}

input[type="text"] {
  flex: 1;
  padding: 14px 16px;
  border: 2px solid var(--card);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
}

input[type="text"]:focus {
  border-color: var(--sand);
}

input[type="text"]::placeholder {
  color: var(--text-dim);
}

/* Buttons */
.btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, var(--sand), var(--accent));
  color: #fff;
}

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-secondary {
  background: var(--card);
  color: var(--text);
  margin-top: 12px;
}

.btn-danger {
  background: var(--accent);
  color: #fff;
  margin-top: 12px;
}

/* Game cards */
.game-card {
  background: var(--surface);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  border: 2px solid transparent;
  transition: border-color 0.3s;
}

.game-card.current {
  border-color: var(--sand);
}

.game-card.completed {
  opacity: 0.7;
}

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--card);
}

.game-num {
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--sand);
}

.game-rest {
  font-size: 0.75rem;
  color: var(--text-dim);
}

.game-body {
  padding: 16px;
}

.game-teams {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
}

.team-label {
  flex: 1;
  padding: 12px 8px;
  border: 2px solid var(--card);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 0.95rem;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
}

.team-label.winner {
  border-color: var(--green);
  color: var(--green);
}

.team-label.loser {
  border-color: var(--accent);
  opacity: 0.6;
}

.vs-label {
  font-weight: 700;
  color: var(--text-dim);
  font-size: 0.8rem;
  flex-shrink: 0;
}

.score-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
}

input[type="number"] {
  width: 70px;
  padding: 12px;
  border: 2px solid var(--card);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 1.4rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
}

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
}

input[type="number"]:focus {
  border-color: var(--sand);
}

.score-colon {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-dim);
}

.game-result-summary {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 0.88rem;
}

.game-result-summary .team {
  flex: 1;
  font-weight: 600;
  color: var(--text-dim);
}

.game-result-summary .team.winner {
  color: var(--green);
}

.game-result-summary .team-left { text-align: left; }
.game-result-summary .team-right { text-align: right; }

.game-result-summary .score {
  color: var(--sand);
  font-weight: 700;
  font-size: 1rem;
  flex-shrink: 0;
  white-space: nowrap;
}

/* Leaderboard */
.leaderboard {
  margin-top: 20px;
  margin-bottom: 20px;
}

.leaderboard h2 {
  font-size: 1.1rem;
  margin-bottom: 12px;
  color: var(--sand);
}

.lb-table {
  width: 100%;
  border-collapse: collapse;
}

.lb-table th {
  padding: 10px 8px;
  text-align: left;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--card);
}

.lb-table td {
  padding: 10px 8px;
  font-size: 0.9rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.lb-table tr:first-child td {
  color: var(--sand);
  font-weight: 700;
}

.lb-table .rank {
  font-weight: 700;
  width: 30px;
}

.lb-table .name { font-weight: 600; }
.lb-table .wins { color: var(--green); text-align: center; }
.lb-table .losses { color: var(--accent); text-align: center; }
.lb-table .points { color: var(--sand); text-align: center; }
.lb-table .games { color: var(--text-dim); text-align: center; }

/* Final screen */
.trophy { text-align: center; font-size: 3rem; margin-bottom: 12px; }

.final-title {
  text-align: center;
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 20px;
  background: linear-gradient(135deg, var(--sand), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.podium {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 8px;
  margin-bottom: 24px;
  height: 180px;
}

.podium-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.podium-bar {
  width: 80px;
  border-radius: 10px 10px 0 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 12px;
}

.podium-bar.p1 { height: 140px; background: linear-gradient(to top, #f4a261, #e76f51); }
.podium-bar.p2 { height: 100px; background: linear-gradient(to top, #8899aa, #6c7a89); }
.podium-bar.p3 { height: 70px; background: linear-gradient(to top, #cd7f32, #a0522d); }

.podium-rank {
  font-size: 1.5rem;
  font-weight: 900;
  color: rgba(255,255,255,0.9);
}

.podium-name {
  font-size: 0.85rem;
  font-weight: 700;
  text-align: center;
}

.podium-stats {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: center;
}

.games-played-note {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-bottom: 16px;
}
</style>
</head>
<body>
<div class="container">
  <h1>Beach Volley Tunis</h1>
  <p class="subtitle">Турнир на 5 / 6 игроков</p>

  <!-- Screen 1: Player Names -->
  <div id="screen-names" class="screen active">
    <div class="player-inputs" id="player-inputs"></div>
    <button class="btn btn-primary" id="btn-start" disabled>Начать турнир</button>
  </div>

  <!-- Screen 2: Current Game + Scoring -->
  <div id="screen-games" class="screen">
    <div id="games-list"></div>

    <div class="leaderboard" id="leaderboard-section">
      <h2>Таблица</h2>
      <table class="lb-table">
        <thead>
          <tr>
            <th class="rank">#</th>
            <th class="name">Игрок</th>
            <th class="wins">Побед</th>
            <th class="losses">Пораж</th>
            <th class="points">Очки</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Screen 3: Final Results -->
  <div id="screen-final" class="screen">
    <div class="trophy">🏐</div>
    <div class="final-title">Турнир завершён!</div>
    <div id="games-played-note" class="games-played-note"></div>
    <div id="podium" class="podium"></div>
    <div class="leaderboard">
      <h2>Итоговая таблица</h2>
      <table class="lb-table">
        <thead>
          <tr>
            <th class="rank">#</th>
            <th class="name">Игрок</th>
            <th class="wins">Побед</th>
            <th class="losses">Пораж</th>
            <th class="points">Очки</th>
            <th class="games">Игр</th>
          </tr>
        </thead>
        <tbody id="final-leaderboard-body"></tbody>
      </table>
    </div>
    <button class="btn btn-primary" id="btn-restart">Новый турнир</button>
  </div>
</div>

<script>
// ============================================================
// PRE-COMPUTED OPTIMAL 12-GAME SCHEDULE (generated by simulated annealing)
// Indices 0-5 map to players. 15/15 partner pairs, 15/15 opponent pairs.
// Each player: 8 games, 4 rests (perfectly balanced).
// ============================================================

const SCHEDULE_TEMPLATE = [
  { team1: [0, 2], team2: [3, 5], rest: [1, 4] },
  { team1: [1, 4], team2: [3, 5], rest: [0, 2] },
  { team1: [0, 4], team2: [1, 2], rest: [3, 5] },
  { team1: [0, 5], team2: [1, 3], rest: [2, 4] },
  { team1: [2, 5], team2: [3, 4], rest: [0, 1] },
  { team1: [0, 1], team2: [4, 5], rest: [2, 3] },
  { team1: [0, 1], team2: [2, 3], rest: [4, 5] },
  { team1: [1, 5], team2: [3, 4], rest: [0, 2] },
  { team1: [0, 3], team2: [2, 4], rest: [1, 5] },
  { team1: [0, 2], team2: [1, 5], rest: [3, 4] },
  { team1: [1, 4], team2: [2, 3], rest: [0, 5] },
  { team1: [0, 5], team2: [2, 4], rest: [1, 3] },
];

// ============================================================
// APP STATE
// ============================================================

let players = [];
let schedule = [];
let results = []; // { score1: number, score2: number }
let currentGame = 0;

// ============================================================
// UI
// ============================================================

const screenNames = document.getElementById('screen-names');
const screenGames = document.getElementById('screen-games');
const screenFinal = document.getElementById('screen-final');

function showScreen(screen) {
  [screenNames, screenGames, screenFinal].forEach(s => s.classList.remove('active'));
  screen.classList.add('active');
  window.scrollTo(0, 0);
}

// --- Screen 1: Player names ---

function initPlayerInputs() {
  const container = document.getElementById('player-inputs');
  for (let i = 1; i <= 6; i++) {
    const div = document.createElement('div');
    div.className = 'player-input';
    div.innerHTML = `
      <div class="player-num">${i}</div>
      <input type="text" id="player-${i}" placeholder="Игрок ${i}" autocomplete="off">
    `;
    container.appendChild(div);
  }

  container.addEventListener('input', () => {
    const filled = Array.from({ length: 6 }, (_, i) =>
      document.getElementById(`player-${i + 1}`).value.trim()
    ).every(v => v.length > 0);
    document.getElementById('btn-start').disabled = !filled;
  });
}

document.getElementById('btn-start').addEventListener('click', () => {
  players = Array.from({ length: 6 }, (_, i) =>
    document.getElementById(`player-${i + 1}`).value.trim()
  );

  schedule = SCHEDULE_TEMPLATE.map(g => ({
    team1: [...g.team1], team2: [...g.team2], rest: [...g.rest]
  }));
  results = [];
  currentGame = 0;

  renderCurrentGame();
  updateLeaderboard();
  showScreen(screenGames);
});

// --- Screen 2: Games (one at a time) ---

function renderCurrentGame() {
  const container = document.getElementById('games-list');
  container.innerHTML = '';

  // Show completed games (collapsed)
  for (let i = 0; i < currentGame; i++) {
    const g = schedule[i];
    const r = results[i];
    if (!r) continue;

    const card = document.createElement('div');
    card.className = 'game-card completed';

    const t1names = g.team1.map(idx => players[idx]).join(' + ');
    const t2names = g.team2.map(idx => players[idx]).join(' + ');
    const restNames = g.rest.map(idx => players[idx]).join(', ');
    const winTeam = r.score1 > r.score2 ? t1names : t2names;

    card.innerHTML = `
      <div class="game-header">
        <span class="game-num">Игра ${i + 1}</span>
        <span class="game-rest">отдых: ${restNames}</span>
      </div>
      <div class="game-result-summary">
        <span class="team team-left ${r.score1 > r.score2 ? 'winner' : ''}">${t1names}</span>
        <span class="score">${r.score1}:${r.score2}</span>
        <span class="team team-right ${r.score2 > r.score1 ? 'winner' : ''}">${t2names}</span>
      </div>
    `;
    container.appendChild(card);
  }

  // Show current game (if not finished)
  if (currentGame < schedule.length) {
    const g = schedule[currentGame];
    const i = currentGame;
    const t1names = g.team1.map(idx => players[idx]).join(' + ');
    const t2names = g.team2.map(idx => players[idx]).join(' + ');
    const restNames = g.rest.map(idx => players[idx]).join(', ');

    const card = document.createElement('div');
    card.className = 'game-card current';
    card.id = `game-${i}`;
    card.innerHTML = `
      <div class="game-header">
        <span class="game-num">Игра ${i + 1} из ${schedule.length}</span>
        <span class="game-rest">отдых: ${restNames}</span>
      </div>
      <div class="game-body">
        <div class="game-teams">
          <div class="team-label" id="team1-label-${i}">${t1names}</div>
          <span class="vs-label">vs</span>
          <div class="team-label" id="team2-label-${i}">${t2names}</div>
        </div>
        <div class="score-row">
          <input type="number" id="score1-${i}" min="0" placeholder="—" inputmode="numeric">
          <span class="score-colon">:</span>
          <input type="number" id="score2-${i}" min="0" placeholder="—" inputmode="numeric">
        </div>
        <button class="btn btn-primary" id="confirm-btn-${i}" onclick="confirmGame(${i})" disabled>Следующая игра</button>
        <button class="btn btn-danger" onclick="finishTournament()">Закончить турнир</button>
      </div>
    `;
    container.appendChild(card);
  }
}

function checkConfirmEnabled(gameIdx) {
  const s1 = document.getElementById(`score1-${gameIdx}`);
  const s2 = document.getElementById(`score2-${gameIdx}`);
  if (!s1 || !s2) return;

  const v1 = parseInt(s1.value);
  const v2 = parseInt(s2.value);
  const valid = !isNaN(v1) && !isNaN(v2) && v1 >= 0 && v2 >= 0 && v1 !== v2;

  document.getElementById(`confirm-btn-${gameIdx}`).disabled = !valid;

  // Highlight winner/loser
  const l1 = document.getElementById(`team1-label-${gameIdx}`);
  const l2 = document.getElementById(`team2-label-${gameIdx}`);
  l1.classList.remove('winner', 'loser');
  l2.classList.remove('winner', 'loser');

  if (valid) {
    l1.classList.add(v1 > v2 ? 'winner' : 'loser');
    l2.classList.add(v2 > v1 ? 'winner' : 'loser');
  }
}

document.addEventListener('input', (e) => {
  if (e.target.id && (e.target.id.startsWith('score1-') || e.target.id.startsWith('score2-'))) {
    const idx = parseInt(e.target.id.split('-').pop());
    checkConfirmEnabled(idx);
  }
});

function confirmGame(gameIdx) {
  const score1 = parseInt(document.getElementById(`score1-${gameIdx}`).value);
  const score2 = parseInt(document.getElementById(`score2-${gameIdx}`).value);

  results[gameIdx] = { score1, score2 };
  currentGame++;

  if (currentGame >= schedule.length) {
    showFinalScreen();
  } else {
    renderCurrentGame();
    updateLeaderboard();
  }
}

function finishTournament() {
  // If current game has valid complete scores, save it before finishing
  if (currentGame < schedule.length) {
    const s1el = document.getElementById(`score1-${currentGame}`);
    const s2el = document.getElementById(`score2-${currentGame}`);
    if (s1el && s2el) {
      const v1 = parseInt(s1el.value);
      const v2 = parseInt(s2el.value);
      if (!isNaN(v1) && !isNaN(v2) && v1 >= 0 && v2 >= 0 && v1 !== v2) {
        results[currentGame] = { score1: v1, score2: v2 };
      }
    }
  }
  showFinalScreen();
}

// --- Leaderboard ---

function getStats() {
  const stats = {};
  for (let i = 0; i < players.length; i++) {
    stats[i] = { name: players[i], wins: 0, losses: 0, points: 0, games: 0 };
  }

  for (let i = 0; i < results.length; i++) {
    if (!results[i]) continue;
    const g = schedule[i];
    const r = results[i];
    const t1won = r.score1 > r.score2;

    const winTeam = t1won ? g.team1 : g.team2;
    const loseTeam = t1won ? g.team2 : g.team1;
    const winScore = t1won ? r.score1 : r.score2;
    const loseScore = t1won ? r.score2 : r.score1;

    for (const p of winTeam) {
      stats[p].wins++;
      stats[p].points += winScore;
      stats[p].games++;
    }
    for (const p of loseTeam) {
      stats[p].losses++;
      stats[p].points += loseScore;
      stats[p].games++;
    }
  }

  return Object.values(stats).sort((a, b) => {
    if (b.wins !== a.wins) return b.wins - a.wins;
    return b.points - a.points;
  });
}

function updateLeaderboard() {
  renderLeaderboardTable('leaderboard-body');
}

function renderLeaderboardTable(tableId, showGames = false) {
  const tbody = document.getElementById(tableId);
  const sorted = getStats();
  tbody.innerHTML = '';

  sorted.forEach((s, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank">${i + 1}</td>
      <td class="name">${s.name}</td>
      <td class="wins">${s.wins}</td>
      <td class="losses">${s.losses}</td>
      <td class="points">${s.points}</td>
      ${showGames ? `<td class="games">${s.games}</td>` : ''}
    `;
    tbody.appendChild(tr);
  });
}

// --- Final screen ---

function showFinalScreen() {
  const sorted = getStats();
  const gamesPlayed = results.filter(r => r != null).length;

  document.getElementById('games-played-note').textContent =
    `Сыграно игр: ${gamesPlayed} из ${schedule.length}`;

  // Podium
  const podium = document.getElementById('podium');
  const order = [1, 0, 2]; // 2nd, 1st, 3rd
  podium.innerHTML = '';

  order.forEach(rank => {
    if (!sorted[rank]) return;
    const s = sorted[rank];
    const div = document.createElement('div');
    div.className = 'podium-item';
    div.innerHTML = `
      <div class="podium-name">${s.name}</div>
      <div class="podium-stats">${s.wins}W ${s.points}pts</div>
      <div class="podium-bar p${rank + 1}">
        <div class="podium-rank">${rank + 1}</div>
      </div>
    `;
    podium.appendChild(div);
  });

  renderLeaderboardTable('final-leaderboard-body', true);
  showScreen(screenFinal);
}

function resetToNames() {
  showScreen(screenNames);
}

document.getElementById('btn-restart').addEventListener('click', () => {
  for (let i = 1; i <= 6; i++) {
    document.getElementById(`player-${i}`).value = '';
  }
  document.getElementById('btn-start').disabled = true;
  resetToNames();
});

// Init
initPlayerInputs();
</script>
</body>
</html>
